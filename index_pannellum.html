<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanoramaViewer Pannellum</title>
    <link rel="stylesheet" href="pannellum.css"/>
    <script type="text/javascript" src="pannellum.js"></script>
    <style>
    body{
        margin: 0px;
        overflow: hidden;
    }
    #panorama {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
    }
    
    #hide_zone {
        position: absolute;
        bottom: 8px;
        right: 0px;
        width: auto;
        height: auto;
        z-index: 998;
        opacity: 0;
        transition: opacity 0.3s ease;
        white-space: nowrap;
        font-size: 0; 
    }
    

    #hide_zone:hover {
        opacity: 1;
    }
    
    .control-btn {
        display: inline-block;
        width: 36px;
        height: 36px;
        cursor: pointer;
        transition: transform 0.2s ease;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        padding: 4px;
        box-sizing: border-box;
        margin-right: 12px;
        vertical-align: top;
    }
    
    .control-btn:last-child {
        margin-right: 0;
    }
    
    .control-btn:hover {
        transform: scale(1.05);
        background: rgba(0, 0, 0, 0.5);
    }
    
    .control-btn:active {
        transform: scale(0.95);
    }
    
    .control-btn svg {
        width: 100%;
        height: 100%;
        display: block;
    }
    
    @media all and (-webkit-min-device-pixel-ratio:0) {
        .control-btn {
            margin-right: 8px;
        }
    }
    
    </style>
</head>
<body>

<div id="panorama"></div>
<div id="hide_zone">
    <div id="toggle_open_in_browser" class="control-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M 4 8 V 4 h 16 V 8 M 20 16 v 4 h -16 V 16 " stroke="black" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 4 8 V 4 h 16 V 8 M 20 16 v 4 h -16 V 16" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <g transform="translate(12, 12) scale(0.85) translate(-12, -12)">
            <path d="M12 7C7 7 3.5 11 3.5 12C3.5 13 7 17 12 17C17 17 20.5 13 20.5 12C20.5 11 17 7 12 7Z" stroke="black" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 7C7 7 3.5 11 3.5 12C3.5 13 7 17 12 17C17 17 20.5 13 20.5 12C20.5 11 17 7 12 7Z" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r=".8" stroke="black" stroke-width="4" fill="none"/>
            <circle cx="12" cy="12" r=".8" stroke="white" stroke-width="2" fill="none"/>
            </g>
        </svg>
    </div>
    <div id="toggle_hide_controls" class="control-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="black" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const zone = document.getElementById("hide_zone");
        const controls = document.getElementById("toggle_hide_controls");
        const controls_br = document.getElementById("toggle_open_in_browser");

        let expanded = false;


        controls.addEventListener("click", (e) => {
            e.stopPropagation();
            expanded = !expanded;
            controls.innerHTML = expanded
                ? collapseSvg
                : expandSvg;
            console.log(`{"hide_controls": ${expanded}}`);
        });

        controls_br.addEventListener("click", (e) => {
            e.stopPropagation();
            console.log(`{"open_in_browser": 1}`);
        });

        const expandSvg = `
        <svg viewBox="0 0 24 24">
        <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="black" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        `;

        const collapseSvg = `
        <svg viewBox="0 0 24 24">
        <path d="M18 6 L14 10 M14 10 L18 10 M14 10 L14 6 M6 18 L10 14 M10 14 L6 14 M10 14 L10 18" stroke="black" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M18 6 L14 10 M14 10 L18 10 M14 10 L14 6 M6 18 L10 14 M10 14 L6 14 M10 14 L10 18" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        `;


        function getQueryParam(paramName) {
            var queryString = window.location.search.substring(1);
            if (!queryString) return null;

            var vars = queryString.split("&");
            
            for (var i = 0; i < vars.length; i++) {
                var pair = vars[i].split("=");
                if (decodeURIComponent(pair[0]) === paramName) {
                    return pair[1] ? decodeURIComponent(pair[1]) : "";
                }
            }
            return null;
        }

        var angle_init = 90
        var controls_visible = true
        

        if (getQueryParam('angle') !== null) {
            angle_init = angle_init + parseInt(getQueryParam('angle'));
        }

        if (getQueryParam('controls_visible') == 'True') {
            controls_visible = true;
        }else{
            controls_visible = false;
        }

        var fov = 90;
        if (getQueryParam('zoom') !== null) {
            fov = parseInt(getQueryParam('zoom'));
            if(fov<30 || fov>120){
                fov = 90
            }
        }
        
        var pitch = 0
        if (getQueryParam('pitch') !== null) {
            pitch = parseInt(getQueryParam('pitch'));
            if(pitch<-85 || pitch>85){
                pitch = 0
            }
        }

	var silent_mode = 0
        if (getQueryParam('silent_mode') !== null) {
            silent_mode = parseInt(getQueryParam('silent_mode'));
        }

        if (!controls_visible) {
            expanded = true;
            controls.innerHTML = collapseSvg ;
        } else {    
            controls.innerHTML = expandSvg ;
        }

        viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "image.JPG",
            "autoLoad": true,
            "showControls": false,
            "compass": false,
            "northOffset": -90,
            "yaw": angle_init,
            "pitch": pitch, 
            "fov": fov
        })

        viewer.setHfov(fov, false); 

        let isDragging = false;

        ['mousedown', 'touchstart'].forEach(ev => {
            viewer.on(ev, () => { isDragging = true; });
        });

        ['mouseup', 'touchend', 'touchcancel'].forEach(ev => {
            viewer.on(ev, () => { isDragging = false; });
        });

        function update() {
            if (isDragging) {
                const yaw = viewer.getYaw().toFixed(2);
                const pitch = viewer.getPitch().toFixed(2);
                const zoom = viewer.getHfov().toFixed(2);
                if(silent_mode===0){
                    console.log(`{"yaw": ${yaw-90}, "pitch":${pitch}, "zoom":${zoom}}`)
                }
            }
            requestAnimationFrame(update);
        }
        update();
        viewer.on('zoomchange', hfov => {
            const yaw = viewer.getYaw().toFixed(2);
            const pitch = viewer.getPitch().toFixed(2);
            const zoom = viewer.getHfov().toFixed(2);
            if(silent_mode===0){
                console.log(`{"yaw": ${yaw-90}, "pitch":${pitch}, "zoom":${zoom}}`)
            }
        });

        window.rotateToAngle = function(angle) {
            if (angle === null) {
                viewer.setYaw(90);
            } else {
                viewer.setYaw(90+angle);
            }
        }

        
    })

</script>

</body>
</html>
